name: Daily Market & Crypto Report

on:
  schedule:
    # 12:00 UTC = 8:00 AM Eastern Daylight Time (adjust for your timezone/DST)
    - cron: "0 12 * * *"
  workflow_dispatch: {}  # lets you click "Run workflow" manually in the Actions tab

permissions:
  contents: write

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Fetch data and render dashboard
        env:
          ALPHA_VANTAGE_KEY: ${{ secrets.ALPHA_VANTAGE_KEY }}
        run: python fetch_and_render.py

      - name: Commit and push updated dashboard
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/index.html
          git diff --quiet --cached || git commit -m "Daily dashboard refresh $(date -u +%Y-%m-%d)"
          git push
